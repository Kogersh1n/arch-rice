background {
    monitor =
    path = /home/duklet/wallpapers/current
    
    blur_passes = 3       
    blur_size = 8        
    noise = 0.0117        
    contrast = 0.8916
    brightness = 0.8172
    vibrancy = 0.1696
    vibrancy_darkness = 0.0
}

input-field {
    monitor =
    size = 250, 50
    outline_thickness = 2
    dots_size = 0.2
    dots_space = 0.2
    dots_center = true
    
    outer_color = rgba(255, 255, 255, 0.1)
    inner_color = rgba(0, 0, 0, 0.3)
    font_color = rgb(200, 200, 200)
    
    fade_on_empty = false
    placeholder_text = <i>Enter Password...</i>
    hide_input = true
    rounding = -1
    
    check_color = rgba(166, 227, 161, 0.8) 
    fail_color = rgba(243, 139, 168, 0.8)  
    fail_transition = 300
    
    position = 0, -70
    halign = center
    valign = center
}

# --- ЧАСЫ ---
label {
    monitor =
    # Перевел в 24-часовой формат (обычно смотрится минималистичнее), но можешь вернуть %I:%M %p
    text = cmd[update:1000] echo "$(date +'%H:%M')"
    color = rgba(255, 255, 255, 0.9)
    font_size = 120
    font_family = JetBrainsMono Nerd Font ExtraBold
    position = 0, 150
    halign = center
    valign = center
    shadow_passes = 3
    shadow_size = 5
}

# --- ДАТА ---
label {
    monitor =
    text = cmd[update:1000] echo "$(date +'%A, %d %B')"
    color = rgba(255, 255, 255, 0.7)
    font_size = 22
    font_family = JetBrainsMono Nerd Font
    position = 0, 30
    halign = center
    valign = center
}

